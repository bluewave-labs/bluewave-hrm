<!DOCTYPE html>
<html>
<head>
    <title>Employee Leave Balance</title>
    <script>
        async function fetchData() {
            const empID = document.getElementById('empID').value;
            const response = await fetch(`http://localhost:3000/employee/${empID}`);
            const data = await response.json();
            document.getElementById('vacation-days').textContent = data.vacation;
            document.getElementById('vacation-hours').textContent = data.vacation * 8;
            document.getElementById('sick-days').textContent = data.sick;
            document.getElementById('sick-hours').textContent = data.sick * 8;
            document.getElementById('personal-days').textContent = data.beaverment;
            document.getElementById('personal-hours').textContent = data.beaverment * 8;
        }

        function redirectToTimeOffPage() {
            window.location.href = 'timeoff.html';
        }
    </script>
</head>
<body>
    <h1>Employee Leave Balance</h1>
    <label for="empID">Employee ID:</label>
    <input type="text" id="empID" name="empID">
    <button onclick="fetchData()">Fetch Data</button>

    <table>
        <tr>
            <th>Policy type</th>
            <th>Available days</th>
            <th>Hours used</th>
        </tr>
        <tr>
            <td>Vacation</td>
            <td id="vacation-days">0</td>
            <td id="vacation-hours">0</td>
        </tr>
        <tr>
            <td>Sick Leave</td>
            <td id="sick-days">0</td>
            <td id="sick-hours">0</td>
        </tr>
        <tr>
            <td>Personal Time</td>
            <td id="personal-days">0</td>
            <td id="personal-hours">0</td>
        </tr>
    </table>

    <button onclick="redirectToTimeOffPage()">Request Time Off</button>
</body>
</html>
